<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>InboxChat | Tienda Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg-primary: #0f0f13;
      --bg-secondary: #1a1a22;
      --bg-tertiary: #24242e;
      --bg-hover: #2e2e3a;
      --text-primary: #f2f3f5;
      --text-secondary: #b5bac1;
      --text-muted: #80848e;
      --border: #2e2e3a;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --success: #23a55a;
      --danger: #f23f42;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.6);
      --radius: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: rgba(15, 15, 19, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: var(--bg-secondary);
      border: none;
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--bg-hover);
      transform: scale(1.05);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 800;
    }

    .header-icons {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      background: var(--bg-secondary);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      transform: scale(1.05);
    }

    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--danger);
      color: white;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* HERO BANNER */
    .hero-banner {
      position: relative;
      height: 260px;
      background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 50%, #db2777 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .hero-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px;
    }

    .hero-logo {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, #fbbf24 50%, #f472b6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .hero-subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 20px;
      font-weight: 500;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      color: #5865f2;
      padding: 10px 24px;
      border-radius: 28px;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    /* CONTAINER */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section {
      margin-bottom: 48px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 800;
    }

    .section-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* PRODUCT CARD */
    .product-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid var(--border);
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }

    .product-preview {
      position: relative;
      height: 160px;
      background: var(--bg-tertiary);
      overflow: hidden;
    }

    .product-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .product-card:hover .product-preview img {
      transform: scale(1.05);
    }

    .wishlist-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .product-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--danger);
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      z-index: 2;
    }

    .product-badge.free {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .product-info {
      padding: 14px;
    }

    .product-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .product-price {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .price-current {
      font-size: 16px;
      font-weight: 800;
    }

    /* PROMO BANNER */
    .promo-banner {
      background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
      border-radius: var(--radius-lg);
      padding: 24px 32px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .promo-title {
      font-size: 24px;
      font-weight: 900;
      color: white;
      margin-bottom: 6px;
    }

    .promo-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 12px;
    }

    .promo-btn {
      background: white;
      color: #5865f2;
      border: none;
      padding: 10px 24px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    /* ANIMACIONES */
    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes shine {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .shine { background: linear-gradient(90deg, #fff, #ffd700, #fff); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent !important; animation: shine 2s linear infinite; }
    .glow { animation: textGlow 1.5s ease-in-out infinite; }
    @keyframes textGlow { 0%, 100% { text-shadow: 0 0 5px currentColor; } 50% { text-shadow: 0 0 20px currentColor; } }
    .fire { animation: textFire 0.5s ease-in-out infinite; }
    @keyframes textFire { 0%, 100% { text-shadow: 0 0 5px #ff4500; } 50% { text-shadow: 0 0 15px #ff6600; } }
    .neon { animation: textNeon 1s ease-in-out infinite; }
    @keyframes textNeon { 0%, 100% { text-shadow: 0 0 5px #00ffff; } 50% { text-shadow: 0 0 20px #00ffff; } }
    .rainbow { animation: textRainbow 3s linear infinite; }
    @keyframes textRainbow { 0% { color: #ff0000; } 17% { color: #ffff00; } 33% { color: #00ff00; } 50% { color: #00ffff; } 67% { color: #0000ff; } 83% { color: #ff00ff; } 100% { color: #ff0000; } }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalSlide 0.3s ease;
      border: 1px solid var(--border);
    }

    @keyframes modalSlide {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    /* PREVIEW TABS */
    .preview-tabs {
      display: flex;
      gap: 8px;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      margin: 16px;
    }

    .preview-tab {
      flex: 1;
      padding: 10px 16px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .preview-tab.active {
      background: var(--accent);
      color: white;
    }

    /* ===== PERFIL PREVIEW - ESTILO DISCORD (AVATAR A LA IZQUIERDA) ===== */
    .profile-preview {
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      margin: 16px;
      overflow: hidden;
    }

    /* Banner con GIF/MP4 de fondo */
    .profile-banner {
      height: 140px;
      background-size: cover;
      background-position: center;
    }

    .profile-banner video,
    .profile-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Contenedor del perfil (avatar + info) */
    .profile-container {
      display: flex;
      align-items: flex-end;
      padding: 0 20px;
      margin-top: -45px;
      position: relative;
      z-index: 5;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* Avatar con anillo */
    .profile-avatar-wrapper {
      position: relative;
    }

    .profile-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5865f2, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: 700;
      border: 4px solid var(--bg-tertiary);
      position: relative;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* SIN EMOJI 👤 - avatar limpio */
    .profile-avatar span {
      display: none;
    }

    /* Anillo giratorio alrededor del avatar */
    .avatar-ring {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 106px;
      height: 106px;
      border-radius: 50%;
      pointer-events: none;
    }

    .avatar-ring img,
    .avatar-ring video {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      animation: spinRing 4s linear infinite;
    }

    /* Información del perfil a la derecha */
    .profile-info {
      flex: 1;
      padding-bottom: 12px;
    }

    /* Placa de nombre con fondo animado — SOLO detrás del texto */
    .nameplate-container {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 40px;
      position: relative;
      margin-bottom: 4px;
    }

    .nameplate-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      border-radius: 40px;
      z-index: -1;
      opacity: 0.8;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 800;
      display: inline-block;
    }

    .profile-badge {
      background: linear-gradient(135deg, #ff6b35, #ffd700);
      color: white;
      padding: 3px 10px;
      border-radius: 14px;
      font-size: 10px;
      font-weight: 700;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
    }

    .profile-username {
      color: var(--text-muted);
      font-size: 13px;
      margin: 4px 0;
    }

    .profile-bio {
      color: var(--text-secondary);
      font-size: 13px;
      max-width: 90%;
    }

    /* Decoration preview */
    .decoration-preview {
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      background: var(--bg-secondary);
    }

    .decoration-avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5865f2, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      position: relative;
    }

    /* Nameplate preview */
    .nameplate-preview {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-secondary);
      border-radius: 12px;
    }

    .nameplate-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b35, #ffd700);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
    }

    .nameplate-info {
      flex: 1;
    }

    .nameplate-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .nameplate-status {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* MODAL BODY */
    .modal-body {
      padding: 0 24px 24px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .modal-description {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-features {
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .modal-features-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .modal-features ul {
      list-style: none;
    }

    .modal-features li {
      padding: 8px 0;
      color: var(--text-secondary);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-features li::before {
      content: '✓';
      color: var(--success);
      font-weight: 700;
      font-size: 16px;
    }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .modal-price {
      font-size: 28px;
      font-weight: 900;
    }

    .modal-price.free {
      color: var(--success);
    }

    .btn-buy {
      flex: 1;
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 28px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-buy:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .btn-gift {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-gift:hover {
      background: var(--bg-hover);
      transform: scale(1.05);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-secondary);
      border-left: 4px solid var(--success);
      padding: 12px 20px;
      border-radius: var(--radius);
      color: white;
      z-index: 2000;
      transform: translateX(400px);
      transition: transform 0.3s ease;
      box-shadow: var(--shadow-lg);
      font-size: 14px;
    }

    .toast.show {
      transform: translateX(0);
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Fondo de placa solo detrás del nombre */
    .nameplate-container[style*="--placa-bg"]::before {
      background-image: var(--placa-bg);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='index.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <div class="header-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        Tienda
      </div>
    </div>
    <div class="header-icons">
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="badge">0</span>
      </button>
    </div>
  </header>

  <div class="hero-banner">
    <div class="hero-particles" id="heroParticles"></div>
    <div class="hero-content">
      <div class="hero-logo">INBOXCHAT</div>
      <div class="hero-subtitle">Encuentra tu estilo único</div>
      <button class="hero-cta" onclick="scrollToLotes()">
        <span>Explorar todo</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="promo-banner">
      <div class="promo-content">
        <div class="promo-title">🔥 Lotes Premium Exclusivos</div>
        <div class="promo-text">Transformaciones completas con animaciones exclusivas</div>
        <button class="promo-btn" onclick="scrollToLotes()">Ver lotes</button>
      </div>
    </div>

    <div class="section" id="lotes-section">
      <div class="section-header">
        <div>
          <div class="section-title">✨ Lotes Premium</div>
          <div class="section-subtitle">Creados por el administrador - Animaciones exclusivas</div>
        </div>
      </div>
      <div class="products-grid" id="lotesContainer">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      
      <div class="preview-tabs">
        <button class="preview-tab active" data-preview="profile">👤 Perfil</button>
        <button class="preview-tab" data-preview="decoration">🎨 Decoración</button>
        <button class="preview-tab" data-preview="nameplate">🏷️ Placa</button>
      </div>

      <div class="live-preview" id="livePreview"></div>

      <div class="modal-body">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-description" id="modalDescription"></div>
        <div class="modal-features">
          <div class="modal-features-title">Incluye</div>
          <ul id="modalFeatures"></ul>
        </div>
        <div class="modal-footer">
          <div>
            <span class="price-original-modal" id="modalOriginalPrice"></span>
            <div class="modal-price" id="modalPrice"></div>
          </div>
          <button class="btn-buy" id="buyBtn" onclick="buyProduct()">Comprar lote</button>
          <button class="btn-gift" title="Regalar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 12 20 22 4 22 4 12"></polyline>
              <rect x="2" y="7" width="20" height="5"></rect>
              <line x1="12" y1="22" x2="12" y2="7"></line>
              <path d="M12 7H7.5a2.5 2.5 0 1 1 0-5C11 2 12 7 12 7z"></path>
              <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
      getFirestore, collection, getDocs, doc, getDoc, updateDoc, 
      arrayUnion, query, orderBy 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_K0MDDuatq8YvrMdAMXOg9NXcZ7q7tm4",
      authDomain: "facebook-b2f45.firebaseapp.com",
      projectId: "facebook-b2f45",
      storageBucket: "facebook-b2f45.firebasestorage.app",
      messagingSenderId: "865628358385",
      appId: "1:865628358385:web:fbdb3144e221bad1fccb50"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentProduct = null;
    let currentPreviewTab = 'profile';
    let allLotes = [];

    function createParticles() {
      const container = document.getElementById('heroParticles');
      if (!container) return;
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.width = Math.random() * 10 + 5 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    async function loadLotes() {
      const container = document.getElementById('lotesContainer');
      try {
        const lotesRef = collection(db, 'lotes');
        const q = query(lotesRef, orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        
        allLotes = [];
        snapshot.forEach(doc => {
          const lote = doc.data();
          if (lote.active !== false) {
            allLotes.push({ id: doc.id, ...lote });
          }
        });
        
        renderLotes();
      } catch (error) {
        console.error('Error cargando lotes:', error);
        container.innerHTML = `<div class="empty-state" style="text-align:center;padding:60px;color:var(--text-muted);">
          <p>Error al cargar lotes. Asegúrate de tener la colección 'lotes' en Firestore.</p>
        </div>`;
      }
    }

    function renderLotes() {
      const container = document.getElementById('lotesContainer');
      
      if (allLotes.length === 0) {
        container.innerHTML = `<div class="empty-state" style="text-align:center;padding:60px;color:var(--text-muted);">
          <p>✨ No hay lotes disponibles aún. El administrador los creará pronto.</p>
        </div>`;
        return;
      }

      container.innerHTML = allLotes.map(lote => `
        <div class="product-card" onclick="openModal('${lote.id}')">
          <div class="product-preview">
            <img src="${lote.fondoPerfilUrl || 'https://media.giphy.com/media/WqLQqKt1npBS1q0r5s/giphy.gif'}" alt="${lote.nombre}">
            <button class="wishlist-btn" onclick="event.stopPropagation(); toggleWishlist(this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
              </svg>
            </button>
            ${lote.precio === 0 ? '<div class="product-badge free">GRATIS</div>' : ''}
          </div>
          <div class="product-info">
            <div class="product-name">${escapeHtml(lote.nombre)}</div>
            <div class="product-price">
              ${lote.precio === 0 ? 
                '<span class="price-current" style="color: var(--success)">GRATIS</span>' : 
                `<span class="price-current">💰 ${lote.precio} monedas</span>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function isVideoUrl(url) {
      return url && (url.includes('.mp4') || url.includes('.webm') || url.includes('.mov'));
    }

    function getEffectClass(effect) {
      const effects = {
        'shine': 'shine', 'glow': 'glow', 'fire': 'fire', 'neon': 'neon', 'rainbow': 'rainbow'
      };
      return effects[effect] || '';
    }

function updateLivePreview() {
  if (!currentProduct) return;
  
  const preview = document.getElementById('livePreview');
  const fondoPerfil = currentProduct.fondoPerfilUrl || '';
  const anilloUrl = currentProduct.anilloUrl || '';
  const fondoPlaca = currentProduct.fondoPlacaUrl || '';
  const textoGif = currentProduct.textoGifUrl || '';
  const colorTexto = currentProduct.colorTexto || '#ffd700';
  const efectoTexto = currentProduct.efectoTexto || 'normal';
  
  const effectClass = getEffectClass(efectoTexto);
  const isFondoVideo = isVideoUrl(fondoPerfil);
  const isAnilloVideo = isVideoUrl(anilloUrl);
  const isPlacaVideo = isVideoUrl(fondoPlaca);

  // Fondo (GIF o MP4) que cubre todo el card
  let fondoHtml = '';
  if (fondoPerfil) {
    if (isFondoVideo) {
      fondoHtml = `<video src="${fondoPerfil}" autoplay loop muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;"></video>`;
    } else {
      fondoHtml = `<img src="${fondoPerfil}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;">`;
    }
  } else {
    fondoHtml = `<div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);z-index:0;"></div>`;
  }

  // Anillo giratorio del avatar
  let ringHtml = '';
  if (anilloUrl) {
    if (isAnilloVideo) {
      ringHtml = `<div style="position:absolute;top:-10px;left:-10px;width:110px;height:110px;border-radius:50%;pointer-events:none;z-index:3;">
        <video src="${anilloUrl}" autoplay loop muted playsinline style="width:100%;height:100%;border-radius:50%;object-fit:cover;animation:spinRing 4s linear infinite;"></video>
      </div>`;
    } else {
      ringHtml = `<div style="position:absolute;top:-10px;left:-10px;width:110px;height:110px;border-radius:50%;pointer-events:none;z-index:3;">
        <img src="${anilloUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;animation:spinRing 4s linear infinite;">
      </div>`;
    }
  }

  // Fondo placa detrás del nombre
  let placaBgHtml = '';
  if (fondoPlaca) {
    if (isPlacaVideo) {
      placaBgHtml = `<video src="${fondoPlaca}" autoplay loop muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;border-radius:40px;"></video>`;
    } else {
      placaBgHtml = `<div style="position:absolute;inset:0;background:url('${fondoPlaca}') center/cover;z-index:0;border-radius:40px;opacity:0.9;"></div>`;
    }
  }

  // Estilo del texto del nombre
  let textStyle = '';
  if (textoGif) {
    textStyle = `background:url('${textoGif}') center/cover;-webkit-background-clip:text;background-clip:text;color:transparent!important;`;
  } else {
    textStyle = `color:${colorTexto};`;
  }

  const nombreEscapado = escapeHtml(currentProduct.nombre) || 'Usuario Premium';

  function buildPlacaBg() {
    if (!fondoPlaca) return '';
    if (isPlacaVideo) {
      return `<video src="${fondoPlaca}" autoplay loop muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;border-radius:inherit;"></video>`;
    } else {
      return `<div style="position:absolute;inset:0;background:url('${fondoPlaca}') center/cover;z-index:0;border-radius:inherit;opacity:0.9;"></div>`;
    }
  }

  if (currentPreviewTab === 'profile') {
    preview.innerHTML = `
      <div style="
        position:relative;
        border-radius:16px;
        overflow:hidden;
        margin:16px;
        min-height:280px;
        display:flex;
        flex-direction:column;
        justify-content:flex-end;
      ">
        <!-- GIF/MP4 cubre TODO el card -->
        ${fondoHtml}

        <!-- Overlay oscuro para que se lea el texto -->
        <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%);z-index:1;"></div>

        <!-- Contenido sobre el fondo -->
        <div style="position:relative;z-index:2;padding:20px;display:flex;align-items:flex-end;gap:16px;">
          
          <!-- Avatar con anillo -->
          <div style="position:relative;width:90px;height:90px;flex-shrink:0;">
            ${ringHtml}
            <div style="width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);overflow:hidden;position:relative;z-index:2;">
              <div style="width:100%;height:100%;background:linear-gradient(135deg,#5865f2,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:white;">U</div>
            </div>
          </div>

          <!-- Nombre y usuario -->
          <div style="flex:1;padding-bottom:4px;">
            <!-- Placa de nombre con fondo animado -->
            <div style="position:relative;display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:40px;overflow:hidden;margin-bottom:6px;">
              ${placaBgHtml}
              <span class="${effectClass}" style="font-size:20px;font-weight:800;position:relative;z-index:1;${textStyle}">${nombreEscapado}</span>
              <span style="background:linear-gradient(135deg,#ff6b35,#ffd700);color:#000;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;position:relative;z-index:1;">⭐ ${nombreEscapado}</span>
            </div>
            <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:4px;">@usuario_premium</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.5);">${currentProduct.descripcion || 'Experiencia premium con animaciones exclusivas'}</div>
          </div>
        </div>
      </div>
    `;

  } else if (currentPreviewTab === 'decoration') {
    preview.innerHTML = `
      <div class="decoration-preview">
        <div class="decoration-avatar">
          ${ringHtml}
          <div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#5865f2,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:700;color:white;">U</div>
        </div>
      </div>
    `;

  } else if (currentPreviewTab === 'nameplate') {
    preview.innerHTML = `
      <div style="padding:16px;background:var(--bg-secondary);border-radius:12px;margin:16px;">
        <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Miembros — 3</div>

        <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;margin-bottom:6px;">
          <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);flex-shrink:0;"></div>
          <span style="font-size:14px;font-weight:600;color:var(--text-secondary);">OtroUsuario</span>
        </div>

        <!-- Fila con placa animada -->
        <div style="display:flex;align-items:center;gap:12px;padding:6px 12px;border-radius:8px;position:relative;overflow:hidden;margin-bottom:6px;min-height:56px;">
          ${buildPlacaBg()}
          <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff6b35,#ffd700);flex-shrink:0;position:relative;z-index:1;"></div>
          <div style="position:relative;z-index:1;">
            <div class="${effectClass}" style="font-size:15px;font-weight:700;${textStyle}">${nombreEscapado}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.6);">${nombreEscapado} activado ✨</div>
          </div>
        </div>

        <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;">
          <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#5865f2,#7c3aed);flex-shrink:0;"></div>
          <span style="font-size:14px;font-weight:600;color:var(--text-secondary);">UsuarioNormal</span>
        </div>
      </div>
    `;
  }
}



    function setupPreviewTabs() {
      document.querySelectorAll('.preview-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentPreviewTab = tab.dataset.preview;
          updateLivePreview();
        });
      });
    }

    window.openModal = function(loteId) {
      const product = allLotes.find(l => l.id === loteId);
      if (!product) return;

      currentProduct = product;
      
      document.getElementById('modalTitle').textContent = product.nombre;
      document.getElementById('modalDescription').textContent = product.descripcion || 'Lote premium con animaciones exclusivas';
      
      const featuresList = [];
      if (product.fondoPerfilUrl) featuresList.push('🎬 Fondo de perfil animado');
      if (product.anilloUrl) featuresList.push('💍 Anillo de avatar giratorio');
      if (product.fondoPlacaUrl) featuresList.push('🏷️ Fondo de placa animado');
      if (product.textoGifUrl) featuresList.push('✨ Texto de nombre animado');
      if (product.efectoTexto && product.efectoTexto !== 'normal') featuresList.push(`🎨 Efecto de texto: ${product.efectoTexto}`);
      
      document.getElementById('modalFeatures').innerHTML = featuresList.map(f => `<li>${f}</li>`).join('');
      
      const priceEl = document.getElementById('modalPrice');
      const buyBtn = document.getElementById('buyBtn');
      
      if (product.precio === 0) {
        priceEl.textContent = 'GRATIS';
        priceEl.classList.add('free');
        buyBtn.textContent = 'Obtener lote';
      } else {
        priceEl.textContent = `💰 ${product.precio} monedas`;
        priceEl.classList.remove('free');
        buyBtn.textContent = 'Comprar lote';
      }
      
      currentPreviewTab = 'profile';
      document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.preview-tab')?.classList.add('active');
      
      updateLivePreview();
      document.getElementById('productModal').classList.add('active');
    };

    window.closeModal = function() {
      document.getElementById('productModal').classList.remove('active');
      currentProduct = null;
    };

    window.toggleWishlist = function(btn) {
      btn.classList.toggle('active');
      showToast(btn.classList.contains('active') ? 'Agregado a favoritos ❤️' : 'Eliminado de favoritos');
    };

    window.buyProduct = async function() {
      if (!currentProduct || !currentUser) {
        showToast('Debes iniciar sesión', true);
        return;
      }

      showToast(`✨ Procesando compra de ${currentProduct.nombre}...`);
      
      try {
        const userRef = doc(db, 'users', currentUser.uid);
        const userDoc = await getDoc(userRef);
        const purchases = userDoc.exists() && userDoc.data().purchases ? userDoc.data().purchases : [];
        
        if (!purchases.includes(currentProduct.id)) {
          await updateDoc(userRef, {
            purchases: arrayUnion(currentProduct.id),
            updatedAt: new Date()
          });
          showToast(`✅ ¡${currentProduct.nombre} adquirido! Revisa tu perfil`, false);
        } else {
          showToast(`⚠️ Ya tienes este lote`, false);
        }
        closeModal();
      } catch (error) {
        console.error('Error al comprar:', error);
        showToast('Error al procesar la compra', true);
      }
    };

    window.scrollToLotes = function() {
      document.getElementById('lotes-section').scrollIntoView({ behavior: 'smooth' });
    };

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--success)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      loadLotes();
    });

    createParticles();
    setTimeout(() => setupPreviewTabs(), 500);
  </script>
</body>
</html>
